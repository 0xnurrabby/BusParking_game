<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html" charset="utf-8" />
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bus Parking Out</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    @font-face {
      font-family: gamefont;
      src: url('assets/fnt/gamefont.ttf') format('truetype');
      font-display: swap;
    }
    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      -webkit-touch-callout: none !important;
      -webkit-text-size-adjust: none !important;
      -webkit-user-select: none !important;
      background: #0e2645;
    }
    #renderCanvas {
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      border: none;
    }
    #chain-ui-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2147482000;
      font-family: gamefont, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <script src="js/lib/babylon.js"></script>
  <script src="js/lib/babylon.gui.min.js"></script>
  <script src="js/lib/babylonjs.loaders.min.js"></script>

  <input id="keyboard_hide_input" type="hidden">
  <canvas id="renderCanvas" touch-action="none"></canvas>

  <script src="js/jquery-3.6.5.min.js"></script>
  <script src="js/game.js"></script>
  <script>
    const doResize = true;
    const focusWindow = false;
    function resizeGameCanvas() {
      const canvas = document.querySelector('canvas');
      if (canvas) {
        canvas.style.maxWidth = '100vw';
        canvas.style.maxHeight = '100vh';
      }
    }
    if (doResize) setInterval(resizeGameCanvas, 1500);
    if (focusWindow) {
      window.addEventListener('blur', () => { window.focus(); });
    }
  </script>

  <div id="chain-ui-root"></div>
  <script src="js/chain-ui.js"></script>
  <script src="webapp.js"></script>
</body>
</html>
