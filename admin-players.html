<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>BusOut Admin Players</title><style>body{font-family:Arial,sans-serif;margin:0;background:#e8f5ff;color:#173252}.wrap{max-width:1200px;margin:0 auto;padding:24px}.card{background:#fff;border:3px solid #173252;border-radius:20px;padding:16px;box-shadow:0 8px 0 rgba(23,50,82,.2)}.toolbar{display:grid;grid-template-columns:1fr 180px 180px;gap:12px;margin-bottom:16px}input,button{min-height:42px;border-radius:12px;border:2px solid #173252;padding:0 12px;font-size:14px}button{cursor:pointer;background:#1184ff;color:#fff;font-weight:700}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #c7d8e8;padding:10px 8px;text-align:left;font-size:14px}th{position:sticky;top:0;background:#dff0ff}.table-wrap{max-height:72vh;overflow:auto}.row-actions button{min-height:36px}.status{margin:10px 0 0;font-size:13px;color:#46647e}.muted{color:#46647e;font-size:13px}.addr{font-family:monospace;font-size:13px}</style></head><body><div class="wrap"><div class="card"><h1>Admin Player Box</h1><p class="muted">This is separate from the game UI. Set <code>BUSOUT_ADMIN_KEY</code> on the server, then open this page yourself.</p><div class="toolbar"><input id="admin-key" type="password" placeholder="Enter BUSOUT_ADMIN_KEY"><button id="load-btn" type="button">Load Players</button><button id="refresh-btn" type="button">Refresh</button></div><div class="table-wrap"><table><thead><tr><th>Top</th><th>Address</th><th>Gold</th><th>Tx allowed</th><th>Remain</th><th>Spent</th><th>Level</th><th>Action</th></tr></thead><tbody id="players-body"></tbody></table></div><div id="status" class="status">Ready.</div></div></div><script src="/js/admin-players.js"></script></body></html>
